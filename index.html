<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Birthday Rose</title>

  <meta
    name="description"
    content="Hilarious teasing birthday wishes guaranteed to make your friends snort-laugh."
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Nunito", sans-serif;
      background: linear-gradient(135deg, #fff4c3, #ffe3e3);
      color: hsl(340, 60%, 20%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background 0.5s;
    }

    /* Confetti */

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .confetti-piece {
      position: absolute;
      border-radius: 3px;
      animation: confetti-fall linear infinite;
    }

    @keyframes confetti-fall {

      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Float animation */

    @keyframes float {

      0%,100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    .main {
      position: relative;
      z-index: 10;
      max-width: 48rem;
      margin: 0 auto;
      padding: 3rem 1rem;
      text-align: center;
    }

    h1 {
      font-family: "Fredoka One", cursive;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: hsl(340, 82%, 55%);
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .subtitle {
      font-size: 1.25rem;
      font-weight: 700;
      color: hsl(340, 30%, 45%);
      margin-bottom: 2rem;
    }

    .cake-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .cake-wrapper img {
      width: min(24rem, 80%);
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: float 3s ease-in-out infinite;
    }

    .wishes {
      display: grid;
      gap: 1.5rem;
    }

    .wish-card {
      background: #fff;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      border: 2px solid hsl(340, 40%, 85%);
      cursor: default;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .wish-card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    .wish-card p {
      font-size: 1.125rem;
      font-weight: 700;
      line-height: 1.7;
    }

    /* Translate button */

    .translate-btn {
      padding: 0.5rem 1rem;
      margin-bottom: 2rem;
      background: hsl(340,82%,55%);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }

    .translate-btn:hover {
      background: hsl(340,82%,40%);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: hsl(340,30%,45%);
    }

    audio {
      display: none;
    }

  </style>
</head>

<body>

  <div class="confetti-container" id="confetti"></div>

  <div class="main">

    <h1 id="title">Happy Birthday! Rose 🎉</h1>

    <p class="subtitle" id="subtitle">
      Here are some wishes you probably don't deserve…
    </p>

    <button class="translate-btn" id="translateBtn">
      Translate to Tamil
    </button>

    <div class="cake-wrapper">
      <img
        src="./ChatGPT Image Mar 11, 2026, 09_13_10 PM.png"
        alt="Funny birthday cake"
      />
    </div>

    <div class="wishes" id="wishes"></div>

    <p class="footer">Made with 🔥 by Rowdy</p>

  </div>

  <!-- Background Music -->

  <audio id="bgMusic" autoplay loop muted>
    <source src="en_rojaa_neeye.mp3" type="audio/mpeg">
  </audio>

<script>

window.addEventListener("load", () => {

  const audio = document.getElementById("bgMusic");

  audio.muted = false;

  audio.play().catch(() => {

    document.body.addEventListener(
      "click",
      () => {
        audio.play();
      },
      { once: true }
    );

  });

});

</script>


<script>

const wishes = [

"Happy birthday! You're not old, you're just… vintage. Like cheese. Expensive and a little stinky. 🧀🎂",

"Congrats on surviving another year without adult supervision! Proud of you. 🎉😂",

"They say with age comes wisdom… so where's yours hiding? Happy birthday! 🎈🤔",

"You're not getting older, you're just becoming a classic — like a car nobody can afford to fix. 🚗🎁",

"Happy birthday! May your hairline stay where it is for at least one more year. 🙏💇"

];



/* Improved Tamil */

const wishesTamil = [

"பிறந்தநாள் வாழ்த்துகள்! நீ வயசாகவில்லை… vintage ஆகிறாய். சீஸ் மாதிரி — விலை உயர்ந்ததும் கொஞ்சம் வாசனையும். 🧀🎂",

"பெரியவர்கள் கவனிக்காமல் இன்னொரு ஆண்டை கடந்து வந்ததுக்கு வாழ்த்துகள்! நீங்க ரொம்ப strong. 🎉😂",

"வயசு கூடினால் ஞானம் வரும் என்று சொல்றாங்க… அது உங்கிட எங்கே மறைந்திருக்கிறது? 😆",

"நீ வயசாகவில்லை… classic ஆகிறாய் — சரி செய்ய யாருக்கும் டைம் இல்லாத காரு மாதிரி. 🚗🎁",

"பிறந்தநாள் வாழ்த்துகள்! உங்க hairline இன்னும் ஒரு வருடம் அப்படியே இருக்கட்டும். 🙏💇"

];


const rotations = [-2,1.5,-1,2,-1.5];

const container = document.getElementById("wishes");


function renderWishes(lang="en"){

  container.innerHTML="";

  const arr = lang==="en" ? wishes : wishesTamil;

  arr.forEach((w,i)=>{

    const card=document.createElement("div");

    card.className="wish-card";

    card.style.transform=`rotate(${rotations[i]}deg)`;

    card.innerHTML=`<p>${w}</p>`;

    container.appendChild(card);

  });

}

renderWishes();


const translateBtn=document.getElementById("translateBtn");

let isTamil=false;

translateBtn.addEventListener("click",()=>{

  isTamil=!isTamil;

  renderWishes(isTamil?"ta":"en");

  translateBtn.textContent=isTamil
  ?"Translate to English"
  :"Translate to Tamil";

  document.getElementById("title").textContent=isTamil
  ?"பிறந்தநாள் வாழ்த்துகள்! 🎉"
  :"Happy Birthday! 🎉";

  document.getElementById("subtitle").textContent=isTamil
  ?"இங்கே சில கலாய்ப்பு birthday wishes 😆"
  :"Here are some wishes you probably don't deserve…";

});



/* Confetti */

const colors=[
"hsl(340,82%,55%)",
"hsl(200,80%,65%)",
"hsl(48,100%,67%)",
"hsl(150,60%,50%)",
"hsl(280,70%,60%)"
];

const confettiEl=document.getElementById("confetti");

for(let i=0;i<50;i++){

  const piece=document.createElement("div");

  piece.className="confetti-piece";

  const size=Math.random()*8+4;

  Object.assign(piece.style,{

    left:Math.random()*100+"%",

    width:size+"px",

    height:size*1.5+"px",

    backgroundColor:colors[Math.floor(Math.random()*colors.length)],

    animationDelay:Math.random()*5+"s",

    animationDuration:Math.random()*3+4+"s"

  });

  confettiEl.appendChild(piece);

}

</script>

</body>
</html>
