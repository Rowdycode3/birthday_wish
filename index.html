<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Rose</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Nunito',sans-serif;
background:linear-gradient(135deg,#fff4c3,#ffe3e3);
color:#4a0d2d;
text-align:center;
overflow-x:hidden;
}

/* stage system */

.stage{
display:none;
min-height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
padding:40px;
}

.stage.active{
display:flex;
}

/* intro */

.intro-text{
font-size:40px;
font-weight:900;
animation:fadeUp 2s;
}

/* button */

.next-btn{
margin-top:40px;
padding:12px 25px;
font-size:18px;
background:#ff4da6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* cake */

.cake{
width:280px;
border-radius:20px;
margin-top:30px;
animation:float 3s infinite ease-in-out;
}

/* wishes */

.wishes{
max-width:700px;
display:grid;
gap:20px;
margin-top:40px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
font-weight:700;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* confetti */

.confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.confetti div{
position:absolute;
width:8px;
height:12px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100vh) rotate(0)}
100%{transform:translateY(100vh) rotate(720deg)}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1}
}

.translate{
margin-top:30px;
padding:10px 20px;
background:#ff4da6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="confetti" id="confetti"></div>

<!-- stage 1 -->

<div class="stage active" id="stage1">

<h1 class="intro-text">Hey Rose 👀</h1>

<p>Something special is waiting for you...</p>

<button class="next-btn" onclick="nextStage()">Click Here</button>

</div>

<!-- stage 2 -->

<div class="stage" id="stage2">

<h1 class="intro-text">Today is your day 🎂</h1>

<p>But first... some truth bombs 😏</p>

<button class="next-btn" onclick="nextStage()">Continue</button>

</div>

<!-- stage 3 -->

<div class="stage" id="stage3">

<h1 id="title">Happy Birthday Rose 🎉</h1>

<button class="translate" id="translateBtn">
Translate to Tamil
</button>

<img class="cake" src="ChatGPT Image Mar 11, 2026, 09_13_10 PM.png">

<div class="wishes" id="wishes"></div>

</div>

<audio id="music" autoplay loop muted>
<source src="en_rojaa_neeye.mp3" type="audio/mpeg">
</audio>

<script>

/* music autoplay fix */

window.addEventListener("load",()=>{

const audio=document.getElementById("music")

audio.muted=false

audio.play().catch(()=>{
document.body.addEventListener("click",()=>audio.play(),{once:true})
})

})

/* stages */

let stage=1

function nextStage(){

document.getElementById("stage"+stage).classList.remove("active")

stage++

document.getElementById("stage"+stage).classList.add("active")

}

/* wishes */

const wishes=[

"Happy birthday! You're not old, you're just vintage. Like cheese. 🧀🎂",

"Congrats on surviving another year without adult supervision! 🎉😂",

"They say with age comes wisdom… so where's yours hiding? 🤔",

"You're becoming a classic — like a car nobody can afford to fix. 🚗",

"Happy birthday! May your hairline stay where it is 🙏💇"

]

const tamil=[

"பிறந்தநாள் வாழ்த்துகள்! நீ வயசாகவில்லை… vintage ஆகிறாய்.",

"மற்றொரு ஆண்டை பெரியவர்களின்றி கடந்து வந்ததற்கு வாழ்த்துகள் 😂",

"வயசு கூடினால் ஞானம் வரும் என்று சொல்றாங்க… அது எங்கே?",

"நீ classic ஆகிறாய் — சரி செய்ய யாருக்கும் டைம் இல்லாத காரு போல 🚗",

"உங்க hairline இன்னும் ஒரு வருடம் அப்படியே இருக்கட்டும் 🙏"

]

const container=document.getElementById("wishes")

function render(arr){

container.innerHTML=""

arr.forEach(w=>{

let card=document.createElement("div")

card.className="card"

card.innerText=w

container.appendChild(card)

})

}

render(wishes)

/* translate */

let tamilMode=false

document.getElementById("translateBtn").onclick=()=>{

tamilMode=!tamilMode

render(tamilMode?tamil:wishes)

}

/* confetti */

const confetti=document.getElementById("confetti")

for(let i=0;i<60;i++){

let c=document.createElement("div")

c.style.left=Math.random()*100+"%"

c.style.background=`hsl(${Math.random()*360},80%,60%)`

c.style.animationDuration=4+Math.random()*3+"s"

confetti.appendChild(c)

}

</script>

</body>
</html>
